const MAX_ENR = 66408;
const COLORS  = {public4:"#1d6ab5",private4:"#2d7d46",community:"#b86e0a",branch:"#8b2252"};
const BG      = {public4:"#dbeafe",private4:"#dcfce7",community:"#fef3c7",branch:"#fce7f3"};
const LABELS  = {public4:"Public 4-yr",private4:"Private 4-yr",community:"2-yr / CC",branch:"Branch campus"};

const globeSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
const houseSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

function radius(enr){ return Math.max(5, Math.min(22, Math.sqrt(enr / Math.PI) * 0.7)); }

function makeIcon(type, enr, active){
  const r = radius(enr), color = COLORS[type];
  const size = active ? r * 2 + 6 : r * 2;
  const border = active ? `3px solid white; box-shadow:0 0 0 2px ${color}` : "1.5px solid white";
  const opacity = active ? "1" : "0.87";
  return L.divIcon({
    className: "",
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:${border};opacity:${opacity};cursor:pointer;"></div>`,
    iconAnchor: [size/2, size/2]
  });
}

function showInfo(d){
  const [name,,,type,enr,city,addr,zip,kind,ctrl,instUrl,cityUrl] = d;
  const color=COLORS[type], bg=BG[type];
  const pct = Math.round(enr/MAX_ENR*100);
  const iDomain = instUrl.replace(/https?:\/\//,"").split("/")[0];
  const cDomain = cityUrl.replace(/https?:\/\//,"").split("/")[0];
  document.getElementById("info-empty").style.display="none";
  const card=document.getElementById("info-card");
  card.style.display="block";
  card.innerHTML=`
    <div class="info-name">${name}</div>
    <span class="info-badge" style="background:${bg};color:${color}">${LABELS[type]}</span>
    <div class="info-row"><span class="info-lbl">City</span><span class="info-val">${city}, OH</span></div>
    <div class="info-row"><span class="info-lbl">ZIP</span><span class="info-val">${zip}</span></div>
    <div class="info-row"><span class="info-lbl">Institution</span><span class="info-val">${kind}</span></div>
    <div class="info-row"><span class="info-lbl">Control</span><span class="info-val">${ctrl}</span></div>
    <div class="info-row"><span class="info-lbl">Enrollment</span><span class="info-val" style="color:${color}">${enr.toLocaleString()}</span></div>
    <div class="enr-bar-wrap">
      <div class="enr-bar-lbl">Size vs. largest (Ohio State)</div>
      <div class="enr-bar-bg"><div class="enr-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
    <div class="info-addr">${addr}<br>${city}, OH ${zip}</div>
    <div class="links-section">
      <div class="links-lbl">Websites</div>
      <a class="link-btn inst" href="${instUrl}" target="_blank" rel="noopener">${globeSVG}&nbsp;${iDomain}</a>
      <a class="link-btn city" href="${cityUrl}" target="_blank" rel="noopener">${houseSVG}&nbsp;${cDomain}</a>
    </div>`;
}

function clearInfo(){
  document.getElementById("info-empty").style.display="flex";
  document.getElementById("info-card").style.display="none";
}

let markers=[], selectedMarker=null, currentFilter="all", currentSearch="";

DATA.forEach(d => {
  const [name,lat,lon,type,enr,,city] = d;
  const m = L.marker([lat,lon], {icon: makeIcon(type,enr,false)});
  m._data = d;
  m.on("mouseover", function(e){
    if(selectedMarker!==m){ const el=m.getElement(); if(el) el.querySelector("div").style.opacity="1"; }
    const tt=document.getElementById("tt");
    tt.textContent=name + " — " + d[5];
    tt.style.display="block";
    tt.style.left=(e.originalEvent.clientX+14)+"px";
    tt.style.top=(e.originalEvent.clientY-36)+"px";
  });
  m.on("mousemove", function(e){
    const tt=document.getElementById("tt");
    tt.style.left=(e.originalEvent.clientX+14)+"px";
    tt.style.top=(e.originalEvent.clientY-36)+"px";
  });
  m.on("mouseout", function(){
    if(selectedMarker!==m){ const el=m.getElement(); if(el) el.querySelector("div").style.opacity="0.87"; }
    document.getElementById("tt").style.display="none";
  });
  m.on("click", function(e){
    L.DomEvent.stopPropagation(e);
    if(selectedMarker && selectedMarker!==m){
      const sd=selectedMarker._data; selectedMarker.setIcon(makeIcon(sd[3],sd[4],false));
    }
    if(selectedMarker===m){ m.setIcon(makeIcon(type,enr,false)); selectedMarker=null; clearInfo(); }
    else { m.setIcon(makeIcon(type,enr,true)); selectedMarker=m; showInfo(d); }
  });
  m.addTo(map);
  markers.push({m, data:d});
});

map.on("click", function(){
  if(selectedMarker){ const sd=selectedMarker._data; selectedMarker.setIcon(makeIcon(sd[3],sd[4],false)); selectedMarker=null; clearInfo(); }
  document.getElementById("tt").style.display="none";
});

function updateCount(n){ document.getElementById("count-label").textContent=n+" shown"; }

function applyFilters(){
  let shown=0;
  markers.forEach(({m,data}) => {
    const [name,,,type,,city] = data;
    const typeOk   = currentFilter==="all" || type===currentFilter;
    const searchOk = !currentSearch || name.toLowerCase().includes(currentSearch) || city.toLowerCase().includes(currentSearch);
    if(typeOk && searchOk){ m.addTo(map); shown++; }
    else { m.remove(); if(selectedMarker===m){selectedMarker=null; clearInfo();} }
  });
  updateCount(shown);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function(){
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    currentFilter=this.dataset.filter;
    applyFilters();
  });
});
document.getElementById("search").addEventListener("input", function(){
  currentSearch=this.value.toLowerCase(); applyFilters();
});
</script>
