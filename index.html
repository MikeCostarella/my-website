* { box-sizing: border-box; margin: 0; padding: 0; }
#outer { display: flex; flex-direction: column; font-family: var(--font-sans); }

.filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }

#map-row { display: flex; border: 0.5px solid var(--color-border-tertiary); overflow: hidden; }
#map { flex: 1; height: 580px; min-width: 0; }

#info-header { padding: 12px 14px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
#info-header h3 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }
#info-content { flex: 1; overflow-y: auto; padding: 14px; }
#info-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--color-text-tertiary); font-size: 13px; text-align: center; padding: 20px; }
#info-empty svg { opacity: 0.3; }
.info-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; margin-bottom: 6px; }
.info-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; margin-bottom: 12px; }
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); gap: 8px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: var(--color-text-secondary); flex-shrink: 0; }
.info-val { font-size: 12px; color: var(--color-text-primary); text-align: right; font-weight: 500; }
.info-addr { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
.enr-bar-wrap { margin-top: 12px; }
.enr-bar-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.enr-bar-bg { height: 6px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; }
.enr-bar-fill { height: 6px; border-radius: 99px; transition: width 0.4s ease; }
.links-section { margin-top: 12px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; gap: 6px; }
.links-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; font-weight: 500; }
.link-btn { display: flex; align-items: center; gap: 6px; width: 100%; padding: 7px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); cursor: pointer; font-size: 12px; text-decoration: none; transition: background 0.15s; }
.link-btn.inst { color: var(--color-text-info); }
.link-btn.city { color: var(--color-text-success); }
.link-btn:hover { background: var(--color-background-tertiary); }
.link-btn svg { flex-shrink: 0; opacity: 0.65; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 8px 14px; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); align-items: center; border: 0.5px solid var(--color-border-tertiary); border-top: none; border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg); }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

const MAX_ENR=66408;
const COLORS={public4:'#185FA5',private4:'#3B6D11',community:'#BA7517',branch:'#993556'};
const BG={public4:'#E6F1FB',private4:'#EAF3DE',community:'#FAEEDA',branch:'#FBEAF0'};
const LABELS={public4:'Public 4-yr',private4:'Private 4-yr',community:'2-yr / CC',branch:'Branch campus'};

const globeIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
const cityIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

let map,markers=[],currentFilter='all',currentSearch='',selectedMarker=null;
function radius(e){return Math.max(5,Math.min(22,Math.sqrt(e/Math.PI)*0.7));}

function showInfo(d){
  const [name,,, type,enr,city,addr,zip,kind,ctrl,instUrl,cityUrl]=d;
  const color=COLORS[type],bg=BG[type];
  const pct=Math.round((enr/MAX_ENR)*100);
  const instDomain=instUrl.replace(/https?:\/\//,'').split('/')[0];
  const cityDomain=cityUrl.replace(/https?:\/\//,'').split('/')[0];
  document.getElementById('info-empty').style.display='none';
  const card=document.getElementById('info-card');
  card.style.display='block';
  card.innerHTML=`
    <div class="info-name">${name}</div>
    <span class="info-badge" style="background:${bg};color:${color};">${LABELS[type]}</span>
    <div class="info-row"><span class="info-label">City</span><span class="info-val">${city}, OH</span></div>
    <div class="info-row"><span class="info-label">ZIP</span><span class="info-val">${zip}</span></div>
    <div class="info-row"><span class="info-label">Institution</span><span class="info-val">${kind}</span></div>
    <div class="info-row"><span class="info-label">Control</span><span class="info-val">${ctrl}</span></div>
    <div class="info-row"><span class="info-label">Enrollment</span><span class="info-val" style="color:${color};">${enr.toLocaleString()}</span></div>
    <div class="enr-bar-wrap">
      <div class="enr-bar-label">Size vs. largest (Ohio State)</div>
      <div class="enr-bar-bg"><div class="enr-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>
    <div class="info-addr">${addr}<br>${city}, OH ${zip}</div>
    <div class="links-section">
      <div class="links-label">Websites</div>
      <a class="link-btn inst" href="${instUrl}" target="_blank" rel="noopener">${globeIcon}${instDomain}</a>
      <a class="link-btn city" href="${cityUrl}" target="_blank" rel="noopener">${cityIcon}${cityDomain}</a>
    </div>`;
}

function clearInfo(){
  document.getElementById('info-empty').style.display='flex';
  document.getElementById('info-card').style.display='none';
}

function makeMarker(d){
  const [name,lat,lng,type,enr]=d;
  const r=radius(enr),color=COLORS[type];
  const ni=L.divIcon({className:'',html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${color};border:1.5px solid white;opacity:0.85;cursor:pointer;"></div>`,iconAnchor:[r,r]});
  const ai=L.divIcon({className:'',html:`<div style="width:${r*2+6}px;height:${r*2+6}px;border-radius:50%;background:${color};border:2.5px solid white;opacity:1;cursor:pointer;box-shadow:0 0 0 2px ${color};"></div>`,iconAnchor:[r+3,r+3]});
  const m=L.marker([lat,lng],{icon:ni});
  m._data=d; m._ni=ni; m._ai=ai;
  m.on('mouseover',function(){if(selectedMarker!==m)this.getElement().querySelector('div').style.opacity='1';});
  m.on('mouseout',function(){if(selectedMarker!==m)this.getElement().querySelector('div').style.opacity='0.85';});
  m.on('click',function(){
    if(selectedMarker&&selectedMarker!==m)selectedMarker.setIcon(selectedMarker._ni);
    if(selectedMarker===m){m.setIcon(ni);selectedMarker=null;clearInfo();}
    else{m.setIcon(ai);selectedMarker=m;showInfo(d);}
  });
  return m;
}

function updateCount(n){document.getElementById('count-label').textContent=n+' shown';}

function applyFilters(){
  let shown=0;
  markers.forEach(({m,data})=>{
    const typeMatch=currentFilter==='all'||currentFilter===data[3];
    const searchMatch=!currentSearch||data[0].toLowerCase().includes(currentSearch.toLowerCase())||data[5].toLowerCase().includes(currentSearch.toLowerCase());
    if(typeMatch&&searchMatch){m.addTo(map);shown++;}
    else{m.remove();if(selectedMarker===m){selectedMarker=null;clearInfo();}}
  });
  updateCount(shown);
}

window.addEventListener('load',function(){
  map=L.map('map',{zoomControl:true}).setView([40.2,-82.5],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap contributors &copy; CARTO',maxZoom:18}).addTo(map);
  DATA.forEach(d=>{const m=makeMarker(d);markers.push({m,data:d});});
  applyFilters();
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      currentFilter=this.dataset.filter;
      applyFilters();
    });
  });
  document.getElementById('search').addEventListener('input',function(){currentSearch=this.value;applyFilters();});
  map.on('click',function(e){
    if(e.originalEvent.target===map.getContainer()||e.originalEvent.target.tagName==='CANVAS'){
      if(selectedMarker){selectedMarker.setIcon(selectedMarker._ni);selectedMarker=null;clearInfo();}
    }
  });
});
</script>
