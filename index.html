<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    <title>Index — Site Navigation</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;padding:36px;background:#fafafa;color:#111}

      h1{font-size:20px;margin-bottom:6px}
      p{color:#555;margin-top:0}
      ul{list-style:none;padding:0;margin:20px 0}

      a{display:inline-block;padding:10px 14px;background:#fff;border:1px solid #e6e6e6;border-radius:8px;color:#0366d6;text-decoration:none}

  <body>
    <div class="wrap">
      <h1>Site Index</h1>
      <p>Click a section to open the index page for that directory.</p>

        <li><a href="Elections/Ohio/">Elections/Ohio/</a></li>

</html>
