            font-size: 14px;
            color: #1a1a2e;
        }

        .loc-item .loc-addr {

        }

            color: #0f3460;

            font-weight: 500;

            font-size: 12px;
            color: #888;
            border-bottom: 1px solid #e8e8e8;
            background: #fafafa;

            flex: 1;

        }

        .detail-pane {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            max-width: 520px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.18);
            padding: 0;
            z-index: 800;
            display: none;
            overflow: hidden;
            animation: slideUp .25s ease-out;
        }

            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: #fff;
            padding: 16px 20px;
            position: relative;
        }

            font-weight: 700;

            color: #fff;

            padding: 16px 20px 20px;
        }

            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }

            width: 20px;
            text-align: center;
            flex-shrink: 0;
            font-size: 15px;
            margin-top: 1px;
        }

        .detail-row .label {
            font-size: 11px;

            letter-spacing: .5px;
            color: #999;
            font-weight: 600;
        }

        .detail-row .value {
            font-size: 14px;
            color: #333;
        }

            display: inline-block;
            margin-top: 6px;
            padding: 8px 18px;
            background: #0f3460;
            color: #fff;

// ─── Markers ───────────────────────────────────────────────
const markers = [];
const markerGroup = L.featureGroup();

locations.forEach((loc, idx) => {
    const icon = L.divIcon({
        className: 'custom-marker',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
    });

    const marker = L.marker([loc.lat, loc.lng], { icon })
        .bindTooltip(loc.name, { direction: 'top', offset: [0, -10] });

    marker.on('click', () => selectLocation(idx));
    marker.addTo(markerGroup);
    markers.push(marker);
});

markerGroup.addTo(map);

// ─── Sidebar list ──────────────────────────────────────────
const sidebarList = document.getElementById('sidebarList');
const searchBox = document.getElementById('searchBox');
const locCount = document.getElementById('locCount');

function renderList(filtered) {
    sidebarList.innerHTML = '';
    locCount.textContent = `${filtered.length} of ${locations.length} locations`;
    filtered.forEach(({ loc, idx }) => {
        const div = document.createElement('div');
        div.className = 'loc-item';
        div.dataset.idx = idx;
        div.innerHTML = `
            <div class="loc-name">${loc.name}</div>
            <div class="loc-addr">${loc.address}</div>
            <div class="loc-precinct">${loc.area} — ${loc.precincts}</div>
        `;
        div.addEventListener('click', () => selectLocation(idx));
        sidebarList.appendChild(div);
    });
}

function getFilteredLocations(query) {
    const q = query.toLowerCase();
    return locations.map((loc, idx) => ({ loc, idx }))
        .filter(({ loc }) =>
            !q ||
            loc.name.toLowerCase().includes(q) ||
            loc.address.toLowerCase().includes(q) ||
            loc.precincts.toLowerCase().includes(q) ||
            loc.area.toLowerCase().includes(q)
        );
}

renderList(getFilteredLocations(''));

searchBox.addEventListener('input', () => {
    renderList(getFilteredLocations(searchBox.value));
});

// ─── Selection / Detail ────────────────────────────────────
let selectedIdx = -1;

function selectLocation(idx) {
    // Update sidebar
    document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
    const target = sidebarList.querySelector(`[data-idx="${idx}"]`);
    if (target) {
        target.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Update markers
    markers.forEach((m, i) => {
        const el = m.getElement();
        if (el) el.classList.toggle('highlight', i === idx);
    });

    // Pan map
    map.flyTo([locations[idx].lat, locations[idx].lng], 14, { duration: 0.6 });

    // Show detail pane
    const loc = locations[idx];
    document.getElementById('detailName').textContent = loc.name;
    const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(loc.address)}`;

    document.getElementById('detailBody').innerHTML = `
        <div class="detail-row">
            <div class="icon">📍</div>
            <div>
                <div class="label">Address</div>
                <div class="value">${loc.address}</div>
            </div>
        </div>
        <div class="detail-row">
            <div class="icon">🏛️</div>
            <div>
                <div class="label">Area / Municipality</div>
                <div class="value">${loc.area}</div>
            </div>
        </div>
        <div class="detail-row">
            <div class="icon">📋</div>
            <div>
                <div class="label">Precincts Served</div>
                <div class="value">${loc.precincts}</div>
            </div>
        </div>
        <div class="detail-row">
            <div class="icon">🕐</div>
            <div>
                <div class="label">Polling Hours</div>
                <div class="value">${loc.hours}</div>
            </div>
        </div>
        <div class="detail-row">
            <div class="icon">♿</div>
            <div>
                <div class="label">Accessibility</div>
                <div class="value">${loc.accessibility}</div>
            </div>
        </div>
        <div class="detail-row">
            <div class="icon">📞</div>
            <div>
                <div class="label">Board of Elections</div>
                <div class="value">${loc.phone}</div>
            </div>
        </div>
        <a class="detail-directions" href="${dirUrl}" target="_blank" rel="noopener">
            Get Directions ➜
        </a>
    `;

    const pane = document.getElementById('detailPane');
    pane.classList.add('show');
    selectedIdx = idx;
}

document.getElementById('closeDetail').addEventListener('click', () => {
    document.getElementById('detailPane').classList.remove('show');
    markers.forEach(m => {
        const el = m.getElement();
        if (el) el.classList.remove('highlight');
    });
    document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
    selectedIdx = -1;
});

// keyboard nav
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') document.getElementById('closeDetail').click();
});
</script>

</body>
</html>
